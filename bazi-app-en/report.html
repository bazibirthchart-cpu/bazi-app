<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening report | BaZi Five Elements Reading</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top, #2d2757 0%, #141227 56%);
            color: #f8f7ff;
            font-family: Arial, sans-serif;
        }
        .card {
            width: min(100%, 560px);
            background: #282548;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 28px;
            text-align: center;
        }
        a {
            color: #e9d5ff;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Opening your report</h1>
        <p id="message">Please wait while we restore your paid reading.</p>
        <p><a id="fallbackLink" href="./index.html">Open manually</a></p>
    </main>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token') || '';
        const fallbackLink = document.getElementById('fallbackLink');
        if (!token) {
            document.getElementById('message').textContent = 'This report link is missing its token. Please use the full permanent link from your payment page or email.';
        } else {
            const target = new URL('./index.html', window.location.href);
            target.searchParams.set('token', token);
            fallbackLink.href = target.toString();
            setTimeout(() => {
                window.location.replace(target.toString());
            }, 120);
        }
    </script>
</body>
</html>
